async function geocode(address,bias){
if(!address||!address.trim())return null;
// If query looks like just a venue name (no city/state/zip), append bias location
let q=address.trim();
const hasGeo=/\d{5}|,\s*[A-Z]{2}\b|,\s*\w+\s+(state|city|county)|portland|seattle|denver|austin|new york|los angeles|chicago|san francisco/i.test(q);
if(!hasGeo&&bias)q=q+", "+bias;
else if(!hasGeo)q=q+", Portland, OR";// default bias
const cacheKey=q.toLowerCase().replace(/[^a-z0-9]/g,"_");
const snap=await db.ref(P(`geocache/${cacheKey}`)).once("value");
if(snap.val())return snap.val();
try{
const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1`);
const d=await r.json();
if(d.length>0){const loc={lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)};
db.ref(P(`geocache/${cacheKey}`)).set(loc);return loc}
}catch(e){console.log("geocode error",e)}return null}

function generateICS(events){let s="BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//CWKI//EN\nCALSCALE:GREGORIAN\n";
events.forEach(e=>{const[y,m,d]=e.date.split("-").map(Number);const[sh,sm]=e.timeStart.split(":").map(Number);const[eh,em]=e.timeEnd.split(":").map(Number);const p=n=>String(n).padStart(2,"0");
s+=`BEGIN:VEVENT\nDTSTART:${y}${p(m)}${p(d)}T${p(sh)}${p(sm)}00\nDTEND:${y}${p(m)}${p(d)}T${p(eh)}${p(em)}00\nSUMMARY:${e.title||"Hangout"}\nDESCRIPTION:${e.description||""}\nEND:VEVENT\n`});
s+="END:VCALENDAR";return s}
function dlICS(events,fn){const b=new Blob([generateICS(events)],{type:"text/calendar"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=fn||"events.ics";a.click();URL.revokeObjectURL(u)}
function sendNotif(db,from,toNames,msg,allUsers,type,refId){Object.entries(allUsers).forEach(([uid,u])=>{if(toNames.includes(u.name))db.ref(P(`notifications/${uid}`)).push({from,message:msg,time:Date.now(),read:false,type:type||"general",refId:refId||null})})}

/* ===== MINI MAP PREVIEW ===== */
function MiniMap({location,bias}){
const ref=useRef(null);const mapRef=useRef(null);const mkRef=useRef(null);
const[resolved,setResolved]=useState(null);const[loading,setLoading]=useState(false);const timerRef=useRef(null);
useEffect(()=>{if(timerRef.current)clearTimeout(timerRef.current);
if(!location||!location.trim()){setResolved(null);if(mkRef.current&&mapRef.current){mapRef.current.removeLayer(mkRef.current);mkRef.current=null}return}
setLoading(true);
timerRef.current=setTimeout(async()=>{const loc=await geocode(location,bias);
if(loc){setResolved(loc);setLoading(false);
if(!mapRef.current&&ref.current){const m=L.map(ref.current,{zoomControl:false,attributionControl:false,dragging:false,scrollWheelZoom:false,doubleClickZoom:false,touchZoom:false}).setView([loc.lat,loc.lng],15);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(m);mapRef.current=m;setTimeout(()=>m.invalidateSize(),100)}
if(mapRef.current){mapRef.current.setView([loc.lat,loc.lng],15);
if(mkRef.current)mapRef.current.removeLayer(mkRef.current);
mkRef.current=L.marker([loc.lat,loc.lng]).addTo(mapRef.current)}
}else{setResolved(null);setLoading(false)}},600);
return()=>{if(timerRef.current)clearTimeout(timerRef.current)}},[location,bias]);
useEffect(()=>{return()=>{if(mapRef.current){mapRef.current.remove();mapRef.current=null}}},[]);
if(!location||!location.trim())return null;
return(<div style={{marginTop:8}}>
{loading&&<div style={{fontSize:11,color:"#94a3b8",marginBottom:4}}>finding location...</div>}
{resolved&&!loading&&<div style={{fontSize:11,color:"#22c55e",marginBottom:4,fontWeight:600}}>✓ location found</div>}
{!resolved&&!loading&&location.trim()&&<div style={{fontSize:11,color:"#f59e0b",marginBottom:4}}>location not found — try adding city/state</div>}
<div ref={ref} style={{height:resolved?140:0,borderRadius:10,overflow:"hidden",border:resolved?"1px solid #e2e8f0":"none",transition:"height 0.3s"}}/>
</div>)}

/* ===== GUIDED TOUR ===== */
function Tour({steps,onEnd}){

const step=steps[idx];

const measure=useCallback(()=>{if(!step)return;
const el=document.querySelector(`[data-tour="${step.target}"]`);
if(!el){setPos({top:0,left:0,width:window.innerWidth,height:0});return}
const r=el.getBoundingClientRect();const pad=8;
setPos({top:r.top-pad+window.scrollY,left:r.left-pad,width:r.width+pad*2,height:r.height+pad*2});
// Position tooltip
const tipW=300;const tipH=160;
let tTop=r.bottom+12+window.scrollY;let tLeft=Math.max(12,r.left+r.width/2-tipW/2);let align="below";
if(tLeft+tipW>window.innerWidth-12)tLeft=window.innerWidth-tipW-12;
if(r.bottom+tipH+20>window.innerHeight){tTop=r.top-tipH-12+window.scrollY;align="above"}
setTipPos({top:tTop,left:tLeft});setTipAlign(align);
// Scroll into view
el.scrollIntoView({behavior:"smooth",block:"center"})},[step]);

useEffect(()=>{measure();const h=()=>setTimeout(measure,100);window.addEventListener("resize",h);window.addEventListener("scroll",h);
return()=>{window.removeEventListener("resize",h);window.removeEventListener("scroll",h)}},[idx,measure]);
useEffect(()=>{const t=setTimeout(measure,300);return()=>clearTimeout(t)},[idx]);

if(!step)return null;const isLast=idx===steps.length-1;const isFirst=idx===0;
return(<>
{/* Overlay with cutout */}
<div style={{position:"fixed",inset:0,zIndex:9998,pointerEvents:"none"}}>
<svg width="100%" height="100%" style={{position:"absolute",inset:0}}>

{/* Spotlight border */}
<div style={{position:"absolute",top:pos.top,left:pos.left,width:pos.width,height:pos.height,borderRadius:12,border:"2px solid #e040fb",boxShadow:"0 0 0 4px rgba(224,64,251,0.2)",zIndex:9999,pointerEvents:"none",transition:"all 0.35s ease"}}/>

<div style={{background:"#fff",borderRadius:14,padding:"20px 22px",boxShadow:"0 12px 40px rgba(0,0,0,0.18)",border:"1px solid #e2e8f0"}}>

<p style={{fontSize:13,color:"#475569",lineHeight:1.6,marginBottom:16}}>{step.desc}</p>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<div style={{display:"flex",gap:4}}>{steps.map((_,i)=><div key={i} style={{width:i===idx?16:6,height:6,borderRadius:3,background:i===idx?"#e040fb":"#e2e8f0",transition:"all 0.2s"}}/>)}</div>
<div style={{display:"flex",gap:8}}>
{!isFirst&&<button onClick={()=>setIdx(idx-1)} style={{padding:"6px 14px",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",background:"#f8fafc",color:"#64748b",border:"1px solid #e2e8f0"}}>back</button>}
{isLast?<button onClick={onEnd} style={{padding:"6px 14px",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",background:"#e040fb",color:"#fff",border:"none"}}>done!</button>
:<button onClick={()=>setIdx(idx+1)} style={{padding:"6px 14px",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",background:"#e040fb",color:"#fff",border:"none"}}>next</button>}
</div></div>
<button onClick={onEnd} style={{position:"absolute",top:8,right:12,background:"none",border:"none",color:"#94a3b8",cursor:"pointer",fontSize:16}}>×</button>
</div></div>
</>)}

useEffect(()=>{const r=db.ref(P(`notifications/${user.uid}`));r.on("value",s=>{const d=s.val();setNotifs(d?Object.entries(d).map(([k,v])=>({...v,key:k})).sort((a,b)=>(b.time||0)-(a.time||0)):[])}); return()=>r.off()},[user.uid]);
const markRead=k=>{db.ref(P(`notifications/${user.uid}/${k}/read`)).set(true)};const clearAll=()=>db.ref(P(`notifications/${user.uid}`)).remove();
return(<div style={{fontFamily:"'DM Sans','Nunito',sans-serif",background:"#f8fafc",minHeight:"100vh",color:"#1e293b",padding:"24px 16px"}}><div style={{maxWidth:500,margin:"0 auto"}}>
<button onClick={onBack} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:14,fontWeight:600,marginBottom:20}}>‹ back</button>
<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
<h1 style={{fontFamily:"'Nunito',sans-serif",fontSize:28,fontWeight:800,background:"linear-gradient(135deg,#f59e0b,#e040fb)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>notifications</h1>
{notifs.length>0&&<button onClick={clearAll} style={{background:"none",border:"1px solid #e2e8f0",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:600,color:"#64748b",cursor:"pointer"}}>clear all</button>}</div>
{notifs.length===0?<p style={{color:"#94a3b8",fontSize:14,fontStyle:"italic"}}>no notifications</p>:
notifs.map(n=>{const c=people.find(p=>p.name===n.from)?.color||"#e040fb";
const isProposal=n.type==="proposal"||n.type==="response";
const isActivity=n.type==="activity";
const hasAction=(isProposal||isActivity)&&n.refId;
const handleClick=()=>{markRead(n.key);if(isProposal&&n.refId)onViewProposal(n.refId);else if(isActivity&&n.refId)onViewActivity(n.refId)};
return(<div key={n.key} onClick={hasAction?handleClick:()=>!n.read&&markRead(n.key)}
style={{padding:"14px 16px",marginBottom:8,background:n.read?"#fff":c+"08",borderRadius:12,borderLeft:`4px solid ${n.read?"#e2e8f0":c}`,cursor:"pointer"}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontWeight:700,fontSize:14,color:n.read?"#94a3b8":c}}>{n.from}</span>
<span style={{fontSize:11,color:"#94a3b8"}}>{n.time?new Date(n.time).toLocaleDateString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}):""}</span></div>
<div style={{fontSize:13,color:n.read?"#94a3b8":"#475569",marginTop:4}}>{n.message}</div>
{hasAction&&<div style={{fontSize:11,color:c,marginTop:6,fontWeight:600}}>tap to view & respond →</div>}
{!hasAction&&!n.read&&<div style={{fontSize:11,color:"#94a3b8",marginTop:6}}>tap to mark read</div>}
</div>)})}</div></div>)}

bounds.push([a.coords.lat,a.coords.lng])});

props.filter(p=>p.coords&&filterDate(p.date)).forEach(pr=>{

bounds.push([pr.coords.lat,pr.coords.lng])});

const adminProfile=Object.values(allUsers).find(u=>(u.email||"").toLowerCase()===ADMIN.toLowerCase());

geocode(u.address).then(loc=>{if(loc&&mapInst.current){

</div>

{MN.map((m,i)=>{const isActive=fM===i;return(
<button key={i} onClick={()=>{setFM(i);setFY(i>=today.getMonth()?today.getFullYear():today.getFullYear()+1)}} style={{padding:"5px 10px",borderRadius:8,fontSize:11,fontWeight:600,cursor:"pointer",
background:isActive?"#e040fb":"#f8fafc",color:isActive?"#fff":"#94a3b8",border:isActive?"none":"1px solid #e2e8f0"}}>{m.slice(0,3)}</button>)})}

function MasterCalendar({user,profile,allUsers,userCrews,onSelectCrew,onBack,onSettings,onNotifs,onFAQ,onMap,onSwitchCrew}){
const today=new Date();
const[cM,setCM]=useState(today.getMonth());const[cY,setCY]=useState(today.getFullYear());
const[crewData,setCrewData]=useState({});
const[sideOpen,setSO]=useState(false);
const[uc,setUC]=useState(0);
useEffect(()=>{const r=db.ref(P(`notifications/${user.uid}`));r.on("value",s=>{const d=s.val()||{};setUC(Object.values(d).filter(n=>!n.read).length)});return()=>r.off()},[user.uid]);
const[loading,setLoading]=useState(true);
const myName=profile?.name||"";
const isAdmin=(profile?.email||"").toLowerCase()===ADMIN.toLowerCase();
const[gProps,setGProps]=useState([]);
const[xDay,setXDay]=useState("");const[xTS,setXTS]=useState("14:00");const[xTE,setXTE]=useState("17:00");
const[xNote,setXNote]=useState("");const[xLoc,setXLoc]=useState("");const[xTo,setXTo]=useState([]);
const[xSearch,setXSearch]=useState("");

// Assign each crew a distinct gradient color
const CREW_COLORS=["#e040fb","#60a5fa","#4ecdc4","#f59e0b","#ef4444","#a78bfa","#22c55e","#f472b6"];

// Load data for all crews
useEffect(()=>{
const refs=[];
const crewIds=(userCrews||[]).map(c=>c.id);
crewIds.forEach(cid=>{
const aR=db.ref(CP(cid,"activities"));
const pR=db.ref(CP(cid,"proposals"));
const bR=db.ref(CP(cid,"busyTimes"));
const mR=db.ref(CP(cid,"members"));
const handler=(type)=>(s)=>{
setCrewData(prev=>{const next={...prev};if(!next[cid])next[cid]={acts:[],props:[],bt:{},members:[]};
if(type==="acts")next[cid].acts=s.val()?Object.values(s.val()):[];
if(type==="props")next[cid].props=s.val()?Object.values(s.val()):[];
if(type==="bt")next[cid].bt=s.val()||{};
if(type==="members")next[cid].members=Object.values(s.val()||{}).filter(u=>u.name&&u.color).map(u=>({name:u.name,color:u.color}));
return next})};
aR.on("value",handler("acts"));pR.on("value",handler("props"));bR.on("value",handler("bt"));mR.on("value",handler("members"));
refs.push(aR,pR,bR,mR)});
setTimeout(()=>setLoading(false),800);
return()=>refs.forEach(r=>r.off())},[userCrews]);

// Global proposals listener
useEffect(()=>{const r=db.ref(P("globalProposals"));r.on("value",s=>{const d=s.val();
setGProps(d?Object.values(d).filter(p=>p.person===myName||p.sendTo?.includes(myName)):[])}); return()=>r.off()},[myName]);

// All people across all crews (deduplicated)
const allPeople=useMemo(()=>{const map={};
(userCrews||[]).forEach(crew=>{const cd=crewData[crew.id];if(!cd)return;
cd.members.forEach(m=>{if(m.name!==myName&&!map[m.name])map[m.name]={name:m.name,color:m.color,crews:[crew.name]};
else if(m.name!==myName&&map[m.name])map[m.name].crews.push(crew.name)})});
// Also include users not in any of my crews (for search)
return Object.values(map)},[crewData,userCrews,myName]);

const submitXProp=async()=>{if(!xDay||xTo.length===0)return;
const loc=xLoc.trim()?await geocode(xLoc.trim(),profile?.address):null;
const resp={};xTo.forEach(n=>{resp[n]={status:"pending",note:"",hidden:false}});
const np={person:myName,date:xDay,timeStart:xTS,timeEnd:xTE,notes:xNote,location:xLoc.trim()||"",coords:loc,sendTo:xTo,responses:resp,id:Date.now(),uid:user.uid,_global:true};
db.ref(P("globalProposals")).push(np);
sendNotif(db,myName,xTo,`${myName} proposed a cross-crew hangout: ${xNote||"let's kick it!"}${xLoc.trim()?" at "+xLoc.trim():""} on ${xDay}`,allUsers,"proposal",np.id);
setXNote("");setXTo([]);setXLoc("")};

const dIM=gDIM(cY,cM),fDay=gFDOM(cY,cM);
const cDays=useMemo(()=>{const d=[];for(let i=0;i<fDay;i++)d.push(null);for(let i=1;i<=dIM;i++)d.push(i);return d},[fDay,dIM]);

const prevM=()=>{if(cM===0){setCM(11);setCY(cY-1)}else setCM(cM-1)};
const nextM=()=>{if(cM===11){setCM(0);setCY(cY+1)}else setCM(cM+1)};

// Build per-day items from all crews
const getDayItems=(day)=>{
const dk=fD(cY,cM,day);const items=[];
(userCrews||[]).forEach((crew,ci)=>{
const cd=crewData[crew.id];if(!cd)return;
const cc=CREW_COLORS[ci%CREW_COLORS.length];
// Activities
cd.acts.filter(a=>a.date===dk).forEach(a=>{
items.push({type:"act",crew,crewColor:cc,data:a,label:a.description,person:a.person,
personColor:cd.members.find(m=>m.name===a.person)?.color||cc})});
// Proposals
cd.props.filter(p=>{
if(p.date!==dk)return false;
if(p.person===myName)return true;
const r=p.responses?.[myName];if(!r)return p.sendTo?.includes(myName);
if(r.hidden)return false;return true;
}).forEach(p=>{
items.push({type:"prop",crew,crewColor:cc,data:p,label:p.notes||"hangout",person:p.person,
personColor:cd.members.find(m=>m.name===p.person)?.color||cc})});
});return items};

// Compute "can we kick it" windows per crew
const getCrewOverlaps=(day)=>{
const dk=fD(cY,cM,day);const overlaps=[];
(userCrews||[]).forEach((crew,ci)=>{
const cd=crewData[crew.id];if(!cd)return;
const cc=CREW_COLORS[ci%CREW_COLORS.length];
const people=cd.members;const bt=cd.bt;
if(people.length<2||!myName)return;
const myE=bt[myName]?.[dk]||[];if(!myE.length)return;
const others=people.filter(p=>p.name!==myName);
const twE=others.filter(p=>(bt[p.name]?.[dk]||[]).length>0);if(!twE.length)return;
const pts=new Set([DS,DE]);[myName,...twE.map(p=>p.name)].forEach(n=>(bt[n]?.[dk]||[]).forEach(e=>{const s=pT(e.start),en=pT(e.end);if(s>DS&&s<DE)pts.add(s);if(en>DS&&en<DE)pts.add(en)}));
const sorted=[...pts].sort((a,b)=>a-b);const isA=(n,mid)=>(bt[n]?.[dk]||[]).some(e=>{const s=pT(e.start),en=pT(e.end);return s<=mid&&en>mid});
const fi=[];for(let i=0;i<sorted.length-1;i++){const st=sorted[i],en=sorted[i+1],mid=(st+en)/2;if(!isA(myName,mid))continue;if(twE.some(p=>isA(p.name,mid)))fi.push({start:st,end:en})}

{pr.sendTo&&<div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>to: {Array.isArray(pr.sendTo)?pr.sendTo.join(", "):pr.sendTo}</div>}

{pr.notes&&<div style={{fontSize:13,color:"#64748b",marginTop:4,fontStyle:"italic"}}>"{pr.notes}"</div>}
{pr.location&&<div style={{fontSize:12,color:"#64748b",marginTop:2}}>📍 {pr.location}</div>}
{Object.entries(resp).length>0&&(<div style={{marginTop:8,display:"flex",flexDirection:"column",gap:4}}>
{Object.entries(resp).map(([name,r])=>{const pc=Object.values(allUsers).find(u=>u.name===name)?.color||"#94a3b8";
return(<div key={name} style={{fontSize:12,display:"flex",alignItems:"center",gap:6}}>
<div style={{width:8,height:8,borderRadius:"50%",background:SC[r.status]||"#94a3b8"}}/>
<span style={{fontWeight:600,color:pc}}>{name}</span>
<span style={{color:SC[r.status]||"#94a3b8"}}>{r.status==="accepted"?"yes we can!":r.status==="declined"?"womp womp":r.status==="raincheck"?"raincheck":"pending"}</span>
</div>)})}</div>)}
{mySt!=="pending"&&mySt!=="sent"&&(<div style={{marginTop:6,fontSize:12,color:SC[mySt],fontWeight:600}}>you: {mySt==="accepted"?"yes we can!":mySt==="declined"?"womp womp":"raincheck?"}</div>)}
</div>)})}
</div>)}
</>)}
</div></div></div>)}

/* ===== APP ===== */
function App(){
const[page,setPage]=useState("loading");const[user,setUser]=useState(null);const[profile,setProfile]=useState(null);const[allUsers,setAU]=useState({});const[people,setPpl]=useState([]);
const[openPropId,setOPI]=useState(null);const[openActId,setOAI]=useState(null);
const[crewId,setCrewId]=useState(null);const[crewInfo,setCrewInfo]=useState(null);const[userCrews,setUC]=useState([]);
const[inviteOpen,setInviteOpen]=useState(false);

useEffect(()=>{db.ref(P("users")).on("value",s=>setAU(s.val()||{}))},[]);

useEffect(()=>{if(!crewId){setCrewInfo(null);return}
const r=db.ref(P(`crews/${crewId}/info`));r.on("value",s=>setCrewInfo(s.val()));return()=>r.off()},[crewId]);

useEffect(()=>{const unsub=au.onAuthStateChanged(u=>{if(u){setUser(u);
db.ref(P(`users/${u.uid}`)).on("value",async s=>{const p=s.val();
if(p){setProfile(p);
const crewSnap=await db.ref(P(`users/${u.uid}/crews`)).once("value");
const crewIds=crewSnap.val()?Object.keys(crewSnap.val()):[];
const crewList=[];for(let ci=0;ci<crewIds.length;ci++){const cid=crewIds[ci];
const infoSnap=await db.ref(P(`crews/${cid}/info`)).once("value");
const memSnap=await db.ref(P(`crews/${cid}/members`)).once("value");
const info=infoSnap.val();if(info)crewList.push({id:cid,...info,memberCount:memSnap.val()?Object.keys(memSnap.val()).length:0})}
setUC(crewList);

if(crewList.length===0){
const migId="crew_"+Date.now()+"_"+Math.random().toString(36).slice(2,6);
await db.ref(P(`crews/${migId}/info`)).set({name:p.name+"'s crew",icon:"🎯",owner:u.uid,createdAt:Date.now()});
await db.ref(P(`crews/${migId}/members/${u.uid}`)).set({name:p.name,color:p.color,email:p.email,uid:u.uid});
const[btS,actS,propS,tpS]=await Promise.all([
db.ref(P("busyTimes")).once("value"),db.ref(P("activities")).once("value"),
db.ref(P("proposals")).once("value"),db.ref(P("testPeople")).once("value")]);
if(btS.val())await db.ref(P(`crews/${migId}/busyTimes`)).set(btS.val());
if(actS.val())await db.ref(P(`crews/${migId}/activities`)).set(actS.val());
if(propS.val())await db.ref(P(`crews/${migId}/proposals`)).set(propS.val());
if(tpS.val()){await db.ref(P(`crews/${migId}/testPeople`)).set(tpS.val());
const tps=Object.values(tpS.val());
for(const tp of tps){const tpId="tp_"+tp.name.replace(/\s/g,"_");
await db.ref(P(`crews/${migId}/members/${tpId}`)).set({name:tp.name,color:tp.color})}}
const allU=await db.ref(P("users")).once("value");const allUV=allU.val()||{};
const allUEntries=Object.entries(allUV);
for(let ei=0;ei<allUEntries.length;ei++){const uid=allUEntries[ei][0];const uData=allUEntries[ei][1];
if(uid!==u.uid&&uData.name&&uData.color){
await db.ref(P(`crews/${migId}/members/${uid}`)).set({name:uData.name,color:uData.color,email:uData.email||"",uid});
const theirCrews=await db.ref(P(`users/${uid}/crews`)).once("value");
const tc=theirCrews.val()||{};tc[migId]=true;
await db.ref(P(`users/${uid}/crews`)).set(tc)}}
await db.ref(P(`users/${u.uid}/crews`)).set({[migId]:true});
setCrewId(migId);setUC([{id:migId,name:p.name+"'s crew",icon:"🎯",owner:u.uid,memberCount:1}]);
setPage(pg=>pg==="loading"||pg==="auth"?"master":pg)
}else if(crewList.length===1){setCrewId(crewList[0].id);
setPage(pg=>{if(pg==="loading"||pg==="auth")return p.hasSeenOnboarding===false?"onboarding":"master";return pg})
}else{setCrewId(crewList[0].id);setPage(pg=>{if(pg==="loading"||pg==="auth")return p.hasSeenOnboarding===false?"onboarding":"master";return pg})}
}else if(SANDBOX){
const prod=await db.ref(`users/${u.uid}`).once("value");const pp=prod.val();
if(pp){await db.ref(P(`users/${u.uid}`)).set({...pp,hasSeenOnboarding:true});setProfile(pp);setPage("master")}
else setPage("auth")
}else setPage("auth")});
}else{setUser(null);setProfile(null);setCrewId(null);setPage("landing")}});return()=>unsub()},[]);

const selectCrew=(id)=>{setCrewId(id);setPage("app")};
const archiveCrew=async()=>{if(!crewId||!user)return;
const snap=await db.ref(P(`users/${user.uid}/crews`)).once("value");
const existing=snap.val()||{};delete existing[crewId];
await db.ref(P(`users/${user.uid}/crews`)).set(Object.keys(existing).length?existing:null);
const arcSnap=await db.ref(P(`users/${user.uid}/archivedCrews`)).once("value");
const arc=arcSnap.val()||{};arc[crewId]=true;
await db.ref(P(`users/${user.uid}/archivedCrews`)).set(arc);
setCrewId(null);setUC(prev=>prev.filter(c=>c.id!==crewId));setPage("master")};
const deleteCrew=async()=>{if(!crewId||!user||!crewInfo)return;
if(crewInfo.owner!==user.uid)return;
await db.ref(P(`crews/${crewId}`)).remove();
const memSnap=await db.ref(P(`crews/${crewId}/members`)).once("value");
const mems=memSnap.val()||{};
for(const uid of Object.keys(mems)){
const uSnap=await db.ref(P(`users/${uid}/crews`)).once("value");
const uc2=uSnap.val()||{};delete uc2[crewId];
await db.ref(P(`users/${uid}/crews`)).set(Object.keys(uc2).length?uc2:null)}
const snap=await db.ref(P(`users/${user.uid}/crews`)).once("value");
const existing=snap.val()||{};delete existing[crewId];
await db.ref(P(`users/${user.uid}/crews`)).set(Object.keys(existing).length?existing:null);
setCrewId(null);setUC(prev=>prev.filter(c=>c.id!==crewId));setPage("master")};

if(page==="loading")return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0a0a0a"}}><p style={{color:"#475569",fontSize:16,fontFamily:"'DM Sans',sans-serif"}}>loading...</p></div>;
if(page==="landing")return<Landing onEnter={()=>setPage("auth")}/>;
if(page==="auth")return<Auth onAuth={u=>setUser(u)}/>;
if(page==="onboarding"&&user)return<Onboarding user={user} onDone={()=>setPage("master")}/>;
if(page==="crews"&&profile)return<CrewSelector user={user} profile={profile} crews={userCrews} onSelect={selectCrew} onCreate={()=>setPage("createCrew")} onMaster={()=>setPage("master")}/>;
if(page==="createCrew"&&profile)return<CreateCrew user={user} profile={profile} onCreated={(id)=>{setCrewId(id);setPage("app")}} onCancel={userCrews.length?()=>setPage("master"):null}/>;
if(page==="settings"&&profile)return<Settings user={user} profile={profile} allUsers={allUsers} crewId={crewId} onBack={()=>setPage(crewId?"app":"master")}/>;
if(page==="notifications"&&profile)return<Notifs user={user} people={people} profile={profile} onBack={()=>setPage(crewId?"app":"master")} onViewProposal={(id)=>{setOPI(id);setPage("app")}} onViewActivity={(id)=>{setOAI(id);setPage("app")}}/>;
if(page==="faq")return<FAQ onBack={()=>setPage(crewId?"app":"master")}/>;
if(page==="updates")return<Updates onBack={()=>setPage(crewId?"app":"master")}/>;
if(page==="map"&&profile&&crewId)return<MapPage user={user} profile={profile} allUsers={allUsers} people={people} crewId={crewId} onBack={()=>setPage("app")}/>;
if(page==="master"&&profile)return<MasterCalendar user={user} profile={profile} allUsers={allUsers} userCrews={userCrews} onSelectCrew={selectCrew} onSettings={()=>setPage("settings")} onNotifs={()=>setPage("notifications")} onFAQ={()=>setPage("faq")} onMap={()=>{if(crewId)setPage("map");else if(userCrews.length>0){setCrewId(userCrews[0].id);setPage("map")}}} onSwitchCrew={()=>setPage("crews")}/>;
if(page==="app"&&profile&&crewId)return<><Main user={user} profile={profile} allUsers={allUsers} crewId={crewId} crewInfo={crewInfo} userCrews={userCrews} onSettings={()=>setPage("settings")} onNotifs={()=>setPage("notifications")} onFAQ={()=>setPage("faq")} onMap={()=>setPage("map")} onSwitchCrew={()=>setPage("crews")} onSelectCrew={selectCrew} onInvite={()=>setInviteOpen(true)} onArchiveCrew={archiveCrew} onDeleteCrew={deleteCrew} onMaster={()=>setPage("master")} onUpdates={()=>setPage("updates")} openProposalId={openPropId} clearOpenProposal={()=>setOPI(null)} openActId={openActId} clearOpenAct={()=>setOAI(null)}/>
<InviteModal isOpen={inviteOpen} onClose={()=>setInviteOpen(false)} crewId={crewId} crewInfo={crewInfo} user={user} profile={profile} allUsers={allUsers}/></>;
return null}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
